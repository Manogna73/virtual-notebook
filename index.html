<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Notebook</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="cover-title">
  <p class="diary-label">✦ My Diary ✦</p>
  <input type="text" id="notebook-title" placeholder="Give your notebook a name..." maxlength="30"/>
</div>

<div class="notebook-wrapper">

  <div class="manifestation-box">
    <p class="manifestation-label">✦ My Reminders ✦</p>
    <textarea id="manifestation" placeholder="Write what you want to remember..."></textarea>
  </div>

  <div class="notebook">
    <span class="flower tl">❀</span>
    <span class="flower tr">❀</span>
    <span class="flower bl">❀</span>
    <span class="flower br">❀</span>
    <div class="page left-page">
      <p class="page-num">1</p>
      <textarea placeholder="Write here..."></textarea>
    </div>
    <div class="page right-page">
      <p class="page-num">2</p>
      <textarea placeholder="Write here..."></textarea>
    </div>
  </div>

</div>

<div class="controls">
  <button id="prev">Previous</button>
  <button id="next">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
